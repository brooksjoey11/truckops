# Skill: route_task
# Version: 1.0.0
#
# Selects the correct specialist agent or internal Orchestrator handler for a parsed intent.
# Routing rules are defined in prompts/routing.md and can be customized there.

skill:
  id: route_task
  display_name: Route Task
  version: "1.0.0"
  description: >
    Selects the correct specialist agent or internal Orchestrator capability to handle
    a parsed owner intent. Consults the agent registry and routing rules. Returns a
    routing decision with handler, required skill, confidence, and fallback.
  trigger: on_demand
  invoked_by: orchestrator_internal
  routing_rules_ref: "${TRUCKOPS_HOME}/agents/orchestrator/prompts/routing.md"

input_schema:
  type: object
  required:
    - intent_id
    - primary_domain
    - structured_task
    - candidate_agents
  properties:
    intent_id:
      type: string
      format: uuid
    primary_domain:
      type: string
    structured_task:
      type: object
    candidate_agents:
      type: array
      items:
        type: string

output_schema:
  type: object
  required:
    - route_id
    - selected_handler
    - routing_reason
    - required_skill
    - confidence
    - fallback_handler
  properties:
    route_id:
      type: string
      format: uuid
    selected_handler:
      type: string
      description: Canonical agent ID or "orchestrator" for internal handling
    routing_reason:
      type: string
      description: Brief explanation of why this handler was selected
    required_skill:
      type: string
      description: The specific skill to invoke on the selected handler
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0
    fallback_handler:
      type: string
      description: Handler to use if the primary handler is unavailable

routing_table:
  # Domain-to-handler mapping. Defined here for reference; authoritative version is in routing.md.
  dispatch: dispatch
  compliance: document_compliance
  documents: document_compliance
  finance: invoicing_collections
  maintenance: orchestrator
  daily_briefing: orchestrator
  development: orchestrator
  unknown: escalate

error_codes:
  - code: ORC-ROUTE-001
    meaning: No handler found for task
    retryable: false
  - code: ORC-ROUTE-002
    meaning: Candidate handler unavailable
    retryable: true
