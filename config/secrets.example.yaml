# TruckOps Secrets Configuration — EXAMPLE ONLY
# DO NOT store actual secrets here or in any repository file.
# All secrets must be stored in GCP Secret Manager.
#
# This file documents which secrets are required and their naming convention.
# Create each secret with:
#   printf "%s" "$SECRET_VALUE" | gcloud secrets create SECRET_NAME --data-file=-

secrets:
  # Required
  model_provider_api_key:
    description: API key for the configured model provider endpoint
    gcp_secret_name: model_provider_api_key
    required: true
    # Set MODEL_PROVIDER_ENDPOINT and MODEL_PROVIDER_NAME as env vars (not secrets)

  # Optional — notifications
  smtp_user:
    description: SMTP username for email notifications
    gcp_secret_name: smtp_user
    required: false

  smtp_password:
    description: SMTP password for email notifications
    gcp_secret_name: smtp_password
    required: false

  # Optional — Telegram
  telegram_bot_token:
    description: Telegram bot token for owner notifications
    gcp_secret_name: telegram_bot_token
    required: false

  # Optional — alerts
  alert_webhook_url:
    description: Webhook URL for system alerts
    gcp_secret_name: alert_webhook_url
    required: false

  # Add load board and broker credentials here when implemented
  # load_board_credentials:
  #   description: Load board API credentials
  #   gcp_secret_name: load_board_credentials
  #   required: false
