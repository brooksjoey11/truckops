# TruckOps Secrets Reference — EXAMPLE FILE
# Version: 1.0.0
#
# THIS FILE IS AN EXAMPLE ONLY.
# It documents what secrets must be stored in GCP Secret Manager.
#
# DO NOT store actual values in this file.
# DO NOT commit actual credentials to the repository.
# ALL secrets must be stored in GCP Secret Manager.
#
# Usage: Copy this file as a reference when setting up Secret Manager.
# Command: printf "%s" "<value>" | gcloud secrets create <secret_name> --data-file=-

secrets:
  # Model Provider API Key
  # Required: Yes
  # Used by: Orchestrator, all agents that call the model provider
  # Secret Manager name: model_provider_api_key
  - name: model_provider_api_key
    description: >
      API key for the configured model provider endpoint.
      This key is provider-agnostic — it corresponds to whatever provider
      is configured in MODEL_PROVIDER_NAME and MODEL_PROVIDER_ENDPOINT.
    required: true
    example_gcloud_command: >
      printf "%s" "YOUR_API_KEY_HERE" |
      gcloud secrets create model_provider_api_key --data-file=-

  # Telegram Bot Token (Optional)
  # Required: No (only if Telegram interface is used)
  # Used by: Orchestrator (optional phone-facing interface)
  - name: telegram_bot_token
    description: Telegram bot token for optional owner Telegram interface.
    required: false
    example_gcloud_command: >
      printf "%s" "YOUR_TELEGRAM_TOKEN" |
      gcloud secrets create telegram_bot_token --data-file=-

  # SMTP Credentials (Optional)
  # Required: No (only if email notifications are enabled)
  - name: smtp_user
    description: SMTP username for email notifications.
    required: false
  - name: smtp_password
    description: SMTP password for email notifications.
    required: false

  # Owner Email (Optional)
  # Required: No (only if email notifications are enabled)
  - name: owner_email
    description: Owner email address for notifications.
    required: false

  # Dispatch Agent Credentials (Optional)
  # Required: No (only if Dispatch Agent uses an authenticated endpoint)
  - name: dispatch_agent_credentials
    description: Credentials for the Dispatch Agent endpoint, if required.
    required: false

  # Load Board Credentials (Optional)
  # Required: No (only if load board integration is implemented)
  - name: load_board_credentials
    description: Credentials for any integrated load board APIs.
    required: false

# GCP Secret Manager Access Pattern:
# gcloud secrets versions access latest --secret="<secret_name>"
#
# Verification:
# gcloud secrets list
